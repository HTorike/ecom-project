<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catapimbas Frutas é um projeto de e-commerce criado para estudos, simulando a venda de frutas frescas online.">
    <title>Catapimbas Frutas</title>
    <link rel="shortcut icon" href="Imagens/favicon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="container header">
        <div class="logo">
            <a href="#">
                <img src="Imagens/logotype.png" alt="Icone de Logotipo">
                <span> Catapimbas Frutas</span>
            </a>
        </div>
        <nav class="icones">
        <a href="#"><img src="Imagens/shop.png" alt="Icone para a página de produtos"></a>
        <a href="#"><img src="Imagens/shopping-cart.png" alt="Carinho de compras"></a>
        <a href="#"><img src="Imagens/user.png" alt="Icone de conta de usuario"></a>
        </nav>
    </header>

    <section id="banner">
        
    </section>

    <section id="sobre">
        <h6>O que é Catapimbas Frutas?</h6>
    </section>

    <section id="formulario">
         <form action="">
                <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" required>
                <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                <label for="mensagem">mensagem:</label>
                    <textarea name="mensagem" id="mensagem" name="mensagem" required></textarea>
                <button type="submit"> <img src="Imagens/send.png" alt="Icone de Envio do formulario"></button>
            </form>
    </section>

    <footer>
        <a href="https://www.facebook.com/login/?locale=pt_BR"> <img src="Imagens/facebook.png" alt="Icone do Facebook"></a>
        <a href="https://www.instagram.com"> <img src="Imagens/instagram.png" alt="Icone do instagram"></a>
        <a href="https://www.whatsapp.com/?lang=pt_PT"> <img src="Imagens/whatsapp.png" alt="Icone do whatsapp"></a>
    </footer>
</body>

</html>
